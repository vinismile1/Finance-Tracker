<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  font-family: "DM Serif Display", serif;
  font-weight: 400;
  font-style: normal;
  margin: 0;
  padding: 0;
  background: #f4f6f9;
  color: black;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


.header{
    display: flex;
    justify-content: space-between;
    gap: 2rem;
    align-items: center;
    position: static;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0, 0,0.1);
    background:#125132;
    padding: 1rem 5%;
}

.header .logo{
    font-size: 3rem;
    font-weight: bolder;
    color:rgb(255, 255, 255);
} 

span{
    color:black;
}

.header ul{
    list-style: none;
    display: flex;
    gap: 1.5rem;
}
.header ul li a {
    text-decoration: none;
    font-weight: 500;
    font-size: 1.5rem;
    color: rgb(255, 255, 255);
    position: relative;
    padding: 0.5rem 0.8rem;  
    border-radius: 10px;     
    transition: color 0.3s ease, background-color 0.3s ease;
}

/* underline effect */
.header ul li a::after {
    content: "";
    position: absolute;
    border-radius: 5px;
    transition: width 0.3s ease;
}

.header ul li a:hover,
.header ul li a:active {
    color: #ffffff;
    background: rgba(101, 255, 158, 0.15); 
}

.header ul li a:hover::after {
    width: 100%;
}


.btn-login {
    background: #47ea83;
    color: black;                
    padding: 0.8rem 1rem;
    border: none;
    font-size: medium;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;                
}

.btn-login:hover {
    background: #249a65;
    color: black;                
    scale: 103%;
}

.btn-login:active { 
    background: #1c7a50;         
    color: white;                
    scale: 100%;                  
}
    </style>
</head>
<body>
     <header class="header">
    <img src="assects\V.final.png" alt="V.SAVE Logo" class="logo-img" width="100" height="100">
    <div class="logo">V.SAVE
    </div>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>

        <button class="btn-login"><a href="signup.html">login/SignUp</a></button>
      </ul>
    </nav>
  </header>
</body>
</html>
