<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v.save-SignUp page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: "DM Serif Display", serif;
            font-weight: 400;
            font-style: normal;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #75efa2, #8cf4b2, #bef0cf);
        }

        .header {
            display: flex;
            justify-content: space-between;
            gap: 2rem;
            align-items: center;
            position: static;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            background: #125132;
            padding: 1rem 5%;
        }

        .header .logo {
            font-size: 3rem;
            font-weight: bolder;
            color: rgb(255, 255, 255);
        }

        span {
            color: black;
        }

        .header ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        .header ul li a {
            text-decoration: none;
            font-weight: 500;
            font-size: 1.5rem;
            color: rgb(255, 255, 255);
            position: relative;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        /* underline effect */
        .header ul li a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 3px;
            background: #47ea83;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .header ul li a:hover,
        .header ul li a:active {
            color: #000000;
            background: rgba(101, 255, 158, 0.15);
        }

        .header ul li a:hover::after {
            width: 100%;
        }


        .btn-login {
            background: #47ea83;
            color: black;
            padding: 0.8rem 1rem;
            border: none;
            font-size: medium;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-login:hover {
            background: #249a65;
            color: black;
            scale: 103%;
        }

        .btn-login:active {
            background: #1c7a50;
            color: white;
            scale: 100%;
        }

        .signup-container {
            max-width: 30%;
            margin-left: 35%;
            margin-top: 5%;
            margin-bottom: 5%;
            background: #fff;
            padding: 1%;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);





        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            background: #f9f9f9;
            max-width: 80%;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 5%;
            margin: auto;
        }

        label {
            display: flex;
            margin-bottom: 5%;
            font-weight: bold;
            color: #000000;

        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            margin-bottom: 10%;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 2%;
            width: 90%;


        }

        button {
            background-color: #28a745;
            color: white;
            width: 95%;
            padding: 10px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>
    <header class="header">
        <img src="assects/V.final.png" alt="V.SAVE Logo" class="logo-img" width="100" height="100">
        <div class="logo">V.SAVE
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>

                <button class="btn-login" onclick="window.location.href='signup.html'">Login/SignUp</button>
            </ul>
        </nav>
    </header>

    <div class="signup-container">
        <h1> SIGN UP</h1>
        <form id="signuinForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <label for="password">Confirm Password:</label>
            <input type="password" id="confirm" name="password" required>
            <br><br>
            <button type="submit" id="signupBtn">SIGN-UP</button>
        </form>
        <p id="signupMessage"></p>
    </div>
</body>
<script>
    let form = document.getElementById('signuinForm');
    if (form) {
        form.onsubmit = function (e) {
            e.preventDefault();
            let username = document.getElementById('username').value.trim();
            let email = document.getElementById('email').value.trim();
            let password = document.getElementById('password').value;
            let confirm = document.getElementById('confirm').value;
            let msg = document.getElementById('signupMessage');

            if (!username || !email || !password || !confirm) {
                msg.innerText = "Please fill all fields.";
                msg.style.color = "red";
                return;
            }

            if (password !== confirm) {
                msg.innerText = "Passwords do not match.";
                msg.style.color = "red";
                return;
            }

            let user = {
                email: email,
                password: password
            };

            localStorage.setItem(username, JSON.stringify(user));
            localStorage.setItem('currentUser', username);
            msg.innerText = "Signup successful!";
            msg.style.color = "green";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 800);
        }
    }
</script>

</html>
