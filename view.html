<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>v.save - View</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: "DM Serif Display", serif;
      font-weight: 400;
      font-style: normal;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #75efa2, #8cf4b2, #bef0cf);
      color: black;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }


    .header {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      align-items: center;
      position: static;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      background: #125132;
      padding: 1rem 5%;
    }

    .header .logo {
      font-size: 3rem;
      font-weight: bolder;
      color: rgb(255, 255, 255);
    }

    span {
      color: black;
    }

    .header ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    .header ul li a {
      text-decoration: none;
      font-weight: 500;
      font-size: 1.5rem;
      color: rgb(255, 255, 255);
      position: relative;
      padding: 0.5rem 0.8rem;
      border-radius: 10px;
      transition: color 0.3s ease, background-color 0.3s ease;
    }

    /* underline effect */
    .header ul li a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 3px;
      background: #47ea83;
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    .header ul li a:hover,
    .header ul li a:active {
      color: #ffffff;
      background: rgba(101, 255, 158, 0.15);
    }

    .header ul li a:hover::after {
      width: 100%;
    }


    .btn-login {
      background: #47ea83;
      color: black;
      padding: 0.8rem 1rem;
      border: none;
      font-size: medium;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
    }

    .btn-login:hover {
      background: #249a65;
      color: black;
      scale: 103%;
    }

    .btn-login:active {
      background: #1c7a50;
      color: white;
      scale: 100%;
    }

    .view-container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 18px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .filter {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
    }

    .chart-wrap {
      position: relative;
      height: 380px;
      width: 100%;
    }

    #no-data {
      text-align: center;
      color: #666;
      padding: 30px 0;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    .card {
      flex: 1;
      margin: 10px;
      max-width: 400px;
      min-height: 400px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
  </style>
</head>

<body>
  <header class="header">
    <img src="assects\V.final.png" alt="V.SAVE Logo" class="logo-img" width="100" height="100">
    <div class="logo">V.SAVE
    </div>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>

        <button class="btn-login"><a href="signup.html">login/SignUp</a></button>
      </ul>
    </nav>
  </header>

  <div class="view-container">

    <div class="filter">
      <h2>Expense Breakdown</h2>

      <label>Period:
        <select id="period">
          <option value="daily">Daily</option>
          <option value="weekly" selected>Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="all">All</option>
        </select>
      </label>
    </div>
    <div class="feature-content" style="flex-wrap:wrap;justify-content:center;display: flex;">
      <section class="card">
        <div class="chart-wrap">
          <canvas id="expenseChart"></canvas>
          <div id="no-data">No data for selected period</div>
      </section>

      <section class="card">
        <h3 style="margin-top:18px;">Details</h3>
        <table id="detail-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'vsave_expenses_v1';
      let expenses = [];
      let chart = null;
      let currentPeriod = document.getElementById('period').value;

      function parseDateInput(d) {
        if (!d) return null;
        const [y, m, day] = d.split('-').map(Number);
        return new Date(y, m - 1, day);
      }

      function loadExpenses() {
        expenses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        expenses = expenses.map(e => ({ ...e, amount: Number(e.amount) }));
      }

      function getFiltered(period) {
        loadExpenses();
        const now = new Date();
        const startOf = (dt) => new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
        const nowStart = startOf(now);
        if (period === 'all') return expenses;
        if (period === 'daily') {
          return expenses.filter(e => {
            const d = startOf(parseDateInput(e.date));
            return d.getTime() === nowStart.getTime();
          });
        }
        if (period === 'weekly') {
          return expenses.filter(e => {
            const d = startOf(parseDateInput(e.date));
            const diffDays = Math.floor((nowStart - d) / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 6;
          });
        }
        if (period === 'monthly') {
          return expenses.filter(e => {
            const d = parseDateInput(e.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
        }
        return expenses;
      }

      function getCategoryTotals(list) {
        const totals = {};
        list.forEach(e => {
          totals[e.category] = (totals[e.category] || 0) + Number(e.amount || 0);
        });
        return totals;
      }

      function generateColors(n) {
        return Array.from({ length: n }, (_, i) => `hsl(${Math.round(360 * i / n)}, 70%, 55%)`);
      }

      function updateChart(period) {
        currentPeriod = period;
        const filtered = getFiltered(period);
        const totals = getCategoryTotals(filtered);
        const labels = Object.keys(totals);
        const data = Object.values(totals);

        // details table
        renderDetails(filtered);

        const noDataDiv = document.getElementById('no-data');
        if (!labels.length) {
          if (chart) { chart.destroy(); chart = null; }
          noDataDiv.style.display = 'block';
          return;
        } else {
          noDataDiv.style.display = 'none';
        }

        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: 'pie',
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: generateColors(labels.length),
              borderColor: '#fff',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'bottom' },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.label}: ${ctx.parsed} `
                }
              }
            }
          }
        });
      }

      function renderDetails(list) {
        const tbody = document.querySelector('#detail-table tbody');
        tbody.innerHTML = '';
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#666;">No items in this period</td></tr>';
          return;
        }
        // sort by date desc
        list.slice().sort((a, b) => (a.date < b.date ? 1 : -1)).forEach(e => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${e.date}</td><td>${e.category}</td><td>${Number(e.amount).toFixed(2)}</td><td>${e.description || ''}</td>`;
          tbody.appendChild(tr);
        });
      }

      // initial
      updateChart(currentPeriod);

      // update when dropdown changes
      document.getElementById('period').addEventListener('change', (e) => updateChart(e.target.value));

      // listen for storage changes (fires in this tab when other tab changes localStorage)
      window.addEventListener('storage', (ev) => {
        if (ev.key === STORAGE_KEY) {
          updateChart(currentPeriod);
        }
      });

      // Also periodically poll (some browsers/dev setups might not fire storage reliably for file:// etc)
      // but in normal use with a server this is not needed. Keeping small poll as fallback:
      setInterval(() => { /* lightweight check - update if data changed length */
        const s = JSON.stringify((JSON.parse(localStorage.getItem(STORAGE_KEY)) || []).map(x => x.id));
        if (!window._lastIds) window._lastIds = '';
        if (s !== window._lastIds) {
          window._lastIds = s;
          updateChart(currentPeriod);
        }
      }, 1000);

    })();
  </script>
</body>

</html>
